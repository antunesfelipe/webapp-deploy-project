# ============================================
# CI/CD PIPELINE
# ============================================
name: CI/CD Pipeline

# ============================================
# TRIGGERS - Quando executar
# ============================================
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# ============================================
# VARIÁVEIS GLOBAIS
# ============================================
env:
  IMAGE_NAME: webapp
  NODE_VERSION: '18'

# ============================================
# JOBS - Trabalhos a executar
# ============================================
jobs:

  # ------------------------------------------
  # JOB 1: TESTES
  # ------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Clonar repositório
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      
      # Step 3: Instalar dependências
      - name: Install dependencies
        working-directory: ./app
        run: npm ci
      
      # Step 4: Rodar testes
      - name: Run tests
        working-directory: ./app
        run: npm test
      
      # Step 5: Verificar sintaxe JS
      - name: Lint code
        working-directory: ./app
        run: node -c server.js

  # ------------------------------------------
  # JOB 2: BUILD DOCKER
  # ------------------------------------------
  build:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      # Step 1: Clonar código
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Step 3: Build da imagem
      - name: Build Docker image
        working-directory: ./app
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest .
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      
      # Step 4: Testar imagem
      - name: Test Docker image
        run: |
          echo "🧪 Starting test container..."
          docker run -d --name test-container -p 3000:3000 ${{ env.IMAGE_NAME }}:latest
          
          echo "⏳ Waiting for container to be ready..."
          sleep 10
          
          echo "🔍 Testing health endpoint..."
          curl -f http://localhost:3000/health || exit 1
          
          echo "🔍 Testing main endpoint..."
          curl -f http://localhost:3000/ || exit 1
          
          echo "✅ Tests passed!"
          docker stop test-container
      
      # Step 5: Ver logs se falhar
      - name: Show container logs on failure
        if: failure()
        run: docker logs test-container

  # ------------------------------------------
  # JOB 3: DOCKER COMPOSE TEST
  # ------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Subir stack completo
      - name: Start full stack
        run: docker-compose up -d
      
      # Aguardar containers ficarem healthy
      - name: Wait for services
        run: |
          echo "⏳ Waiting for services to be healthy..."
          sleep 30
          
          docker-compose ps
      
      # Testar integração
      - name: Test integration
        run: |
          echo "🔍 Testing app health..."
          curl -f http://localhost:3000/health || exit 1
          
          echo "🔍 Testing app main endpoint..."
          curl -f http://localhost:3000/ || exit 1
          
          echo "✅ Integration tests passed!"
      
      # Mostrar logs se falhar
      - name: Show logs on failure
        if: failure()
        run: docker-compose logs
      
      # Sempre parar containers
      - name: Cleanup
        if: always()
        run: docker-compose down -v

  # ------------------------------------------
  # JOB 4: DEPLOY (Simulado)
  # ------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy notification
        run: |
          echo "🚀 Deploying to production..."
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "🔖 Git SHA: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "📅 Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "✅ Deployment successful!"
      
      # Aqui você adicionaria comandos reais de deploy
      # Exemplos:
      # - kubectl apply -f k8s/
      # - docker push
      # - scp para servidor
      # - etc
